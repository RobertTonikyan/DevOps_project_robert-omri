<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת המשימות שלי - ToDo List</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #ffffff; margin-bottom: 1.5rem; }
        .todo-input-section { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #2a2a2a;
            color: white;
        }
        button {
            padding: 10px 15px;
            background-color: #00adb5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #007a80; }
        ul { list-style: none; padding: 0; text-align: right; }
        li {
            padding: 10px;
            background: #252525;
            margin-bottom: 8px;
            border-radius: 4px;
            border-right: 4px solid #00adb5;
        }
        nav { margin-top: 2rem; }
        nav a { color: #00adb5; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>המשימות שלי</h1>
        
        <div class="todo-input-section">
            <input type="text" id="taskInput" placeholder="הוסף משימה חדשה...">
            <button onclick="addTask()">הוסף</button>
        </div>

        <ul id="taskList">
            <li>לסיים את תרגיל ה-DevOps בהצלחה</li>
            <li>לוודא שהקונטיינרים רצים באוויר</li>
        </ul>

        <nav>
            <a href="./about.html">אודות המפתחים</a>
        </nav>
    </div>

    <script>
     
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            if (taskText === '') return;

            const li = document.createElement('li');
            li.textContent = taskText;
            document.getElementById('taskList').appendChild(li);
            input.value = '';
        }
    </script>
</body>
</html>
