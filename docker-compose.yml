
services:

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "${PROXY_PORT}:8080" 
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro 
    networks:
      - frontend-net 
    depends_on:
      - app


  app:
    build:
      context: ./app 
      dockerfile: Dockerfile 
    container_name: node_app
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL} 
      - PORT=3000
    networks:
      - frontend-net 
      - backend-net  
    depends_on:
      - db

 
  db:
    image: postgres:17-alpine 
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend-net

 
  adminer:
    image: dpage/pgadmin4 
    container_name: pgadmin_ui
    user: root 
    restart: always
    ports:
      - "${PGADMIN_PORT}:80" 
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@todo.com 
      PGADMIN_DEFAULT_PASSWORD: root
    networks:
      - backend-net
    depends_on:
      - db

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local